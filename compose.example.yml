services:
  nosql-db:
    image: ghcr.io/oracle/nosql:${NOSQL_VERSION}
    container_name: nosql-local
    restart: unless-stopped
    ports:
      - "${NOSQL_PROXY_PORT}:8080"
      - "${NOSQL_STORAGE_PORT}:5000"
    volumes:
      - nosql_data:/kvroot
    environment:
      - KV_PROXY_PORT=8080
      - KV_PORT=5000

volumes:
  nosql_data:
    driver: local
